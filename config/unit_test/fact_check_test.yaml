version: v0.3

listeners:
  - name: "http-8899"
    address: "0.0.0.0"
    port: 8899
    timeout: "300s"

providers:
  defaults:
    default_model: "MoM"
  models:
    - name: "MoM"
      provider_model_id: "qwen3.5:0.8b"
      backend_refs:
        - name: "primary"
          endpoint: "10.156.186.8:8080"
          protocol: "http"
          type: "openai"
          base_url: "http://10.156.186.8:8080/v1"
          provider: "openai"
          auth_header: "Authorization"
          auth_prefix: "Bearer"
          api_key: "sk-123456"
          extra_headers:
            Authorization: "Bearer sk-123456"
          weight: 100
    - name: "MoM-large"
      provider_model_id: "qwen3.5:122b"
      backend_refs:
        - name: "primary"
          endpoint: "10.156.186.8:8080"
          protocol: "http"
          type: "openai"
          base_url: "http://10.156.186.8:8080/v1"
          provider: "openai"
          auth_header: "Authorization"
          auth_prefix: "Bearer"
          api_key: "sk-123456"
          extra_headers:
            Authorization: "Bearer sk-123456"
          weight: 100

routing:
  modelCards:
    - name: "MoM"
      description: "Fast default text model"
      capabilities: ["chat", "reasoning"]
    - name: "MoM-large"
      description: "Higher quality model for requests that need fact check"
      capabilities: ["chat", "reasoning", "long-context"]

  # Fact-check unit test setup: keep only fact_check signal.
  signals:
    fact_check:
      - name: "needs_fact_check"
        description: "Prompts with factual claims that should be verified."
      - name: "no_fact_check_needed"
        description: "Creative prompts that do not need factual verification."

  # Fact-check-focused route set: one explicit route and one fallback.
  decisions:
    - name: "fact_check_route"
      description: "Requests needing fact-check route to stronger model."
      priority: 200
      rules:
        operator: AND
        conditions:
          - type: fact_check
            name: "needs_fact_check"
      modelRefs:
        - model: MoM-large
          use_reasoning: true
      algorithm:
        type: static

    - name: "default_route"
      description: "Fallback for prompts not requiring fact-check."
      priority: 100
      rules:
        operator: AND
        conditions: []
      modelRefs:
        - model: MoM
          use_reasoning: false
      algorithm:
        type: static

global:
  model_catalog:
    modules:
      hallucination_mitigation:
        enabled: true
        fact_check:
          model_ref: fact_check_classifier
          model_id: models/mmbert32k-factcheck-classifier-merged
          threshold: 0.65
          use_cpu: true
          use_mmbert_32k: true
  stores:
    semantic_cache:
      enabled: false