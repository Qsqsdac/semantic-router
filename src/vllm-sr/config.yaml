version: v0.3

listeners:
  - name: "http-8899"
    address: "0.0.0.0"
    port: 8899
    timeout: "300s"

providers:
  defaults:
    default_model: "MoM"
  models:
    - name: "MoM"
      provider_model_id: "qwen3.5:0.8b"
      backend_refs:
        - name: "primary"
          endpoint: "10.156.186.8:8080"
          protocol: "http"
          type: "openai"
          base_url: "http://10.156.186.8:8080/v1"
          provider: "openai"
          auth_header: "Authorization"
          auth_prefix: "Bearer"
          api_key: "sk-123456"
          extra_headers:
            Authorization: "Bearer sk-123456"
          weight: 100
    - name: "MoM-large"
      provider_model_id: "qwen3.5:122b"
      backend_refs:
        - name: "primary"
          endpoint: "10.156.186.8:8080"
          protocol: "http"
          type: "openai"
          base_url: "http://10.156.186.8:8080/v1"
          provider: "openai"
          auth_header: "Authorization"
          auth_prefix: "Bearer"
          api_key: "sk-123456"
          extra_headers:
            Authorization: "Bearer sk-123456"
          weight: 100

routing:
  modelCards:
    - name: "MoM"
      description: "Fast default text model"
      capabilities: ["chat", "reasoning"]
    - name: "MoM-large"
      description: "Higher quality model for complex jailbreak traffic"
      capabilities: ["chat", "reasoning", "long-context"]

  # Jailbreak unit test setup: keep only jailbreak signal.
  signals:
    jailbreak:
      - name: "prompt_injection"
        method: hybrid
        threshold: 0.8
        include_history: true
        description: Detect common prompt-injection or jailbreak attempts.
        jailbreak_patterns:
          - ignore previous instructions
          - reveal the hidden prompt
          - jailbreak mode
          - do anything now
        benign_patterns:
          - explain the policy
          - summarize the safety rules

  # Jailbreak-focused route set: one explicit security route and one safe fallback.
  decisions:
    - name: "jailbreak_block_route"
      description: "Jailbreak traffic routes to the stronger model and is marked for blocking."
      priority: 200
      rules:
        operator: AND
        conditions:
          - type: jailbreak
            name: "prompt_injection"
      modelRefs:
        - model: MoM-large
          use_reasoning: true
      algorithm:
        type: static
      plugins:
        - type: response_jailbreak
          configuration:
            enabled: true
            threshold: 0.85
            action: block

    - name: "safe_default_route"
      description: "Fallback for non-jailbreak traffic."
      priority: 100
      rules:
        operator: AND
        conditions: []
      modelRefs:
        - model: MoM
          use_reasoning: false
      algorithm:
        type: static

global:
  model_catalog:
    modules:
      prompt_guard:
        enabled: true
        model_ref: prompt_guard
        model_id: models/mmbert32k-jailbreak-detector-merged
        threshold: 0.7
        use_cpu: true
        use_modernbert: false
        use_mmbert_32k: true
        early_exit_enabled: true
        early_exit_layers: [4, 8, 12]
        early_exit_confidence: 0.8
        prompt_crop_enabled: true
        prompt_crop_max_chars: 1024
        prompt_crop_head_chars: 512
        prompt_crop_tail_chars: 512
        jailbreak_mapping_path: models/mmbert32k-jailbreak-detector-merged/jailbreak_type_mapping.json
        use_vllm: false
      prompt_compression:
        enabled: true
        max_tokens: 4096
        min_length: 512
        skip_signals: [jailbreak, pii]
  stores:
    semantic_cache:
      enabled: false