version: v0.3

listeners:
  - name: "http-8899"
    address: "0.0.0.0"
    port: 8899
    timeout: "300s"

providers:
  defaults:
    default_model: "qwen3-8b"
  models:
    - name: "qwen3-8b"
      provider_model_id: "qwen3-8b-instruct"
      backend_refs:
        - name: "primary"
          endpoint: "host.docker.internal:8000"
          protocol: "http"
          weight: 100
    - name: "qwen3-32b"
      provider_model_id: "qwen3-32b-instruct"
      backend_refs:
        - name: "primary"
          endpoint: "host.docker.internal:8001"
          protocol: "http"
          weight: 100

routing:
  modelCards:
    - name: "qwen3-8b"
      description: "Fast default text model"
      capabilities: ["chat", "reasoning"]
    - name: "qwen3-32b"
      description: "Higher quality model for hard or urgent queries"
      capabilities: ["chat", "reasoning", "long-context"]
  signals:
    keywords:
      - name: "urgent_keywords"
        operator: "OR"
        method: "ngram"
        keywords: ["urgent", "asap", "immediately", "critical"]
        case_sensitive: false
        ngram_threshold: 0.4
        ngram_arity: 3
  decisions: []

global:
  model_catalog:
    modules:
      classifier:
        domain:
          intent_match_mode: fasttext_fallback_bert
          intent_keyword_mapping_path: /app/intent-assets/intent_keyword_mapping.json
          intent_keyword_case_sensitive: false
          intent_fasttext_model_path: /app/intent-assets/models/intent_fasttext.bin
          intent_fasttext_binary_path: /app/intent-assets/bin/fasttext
          intent_fasttext_threshold: 0.5
          intent_fasttext_timeout_seconds: 2
