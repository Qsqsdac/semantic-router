version: v0.3

listeners:
  - name: "http-8899"
    address: "0.0.0.0"
    port: 8899
    timeout: "300s"

providers:
  defaults:
    default_model: "qwen3-8b"
  models:
    - name: "qwen3-8b"
      provider_model_id: "qwen3-8b-instruct"
      backend_refs:
        - name: "primary"
          endpoint: "host.docker.internal:8000"
          protocol: "http"
          weight: 100
    - name: "qwen3-32b"
      provider_model_id: "qwen3-32b-instruct"
      backend_refs:
        - name: "primary"
          endpoint: "host.docker.internal:8001"
          protocol: "http"
          weight: 100

routing:
  modelCards:
    - name: "qwen3-8b"
      description: "Fast default text model"
      capabilities: ["chat", "reasoning"]
    - name: "qwen3-32b"
      description: "Higher quality model for hard or urgent queries"
      capabilities: ["chat", "reasoning", "long-context"]
  signals:
    keywords:
      - name: "urgent_keywords"
        operator: "OR"
        method: "ngram"
        keywords: ["urgent", "asap", "immediately", "critical"]
        case_sensitive: false
        ngram_threshold: 0.4
        ngram_arity: 3
  decisions:
    - name: "urgent-route"
      description: "Use stronger model for urgent requests"
      priority: 200
      rules:
        operator: "AND"
        conditions:
          - type: "keyword"
            name: "urgent_keywords"
      modelRefs:
        - model: "qwen3-32b"
          use_reasoning: true
      algorithm:
        type: "static"
      plugins:
        - type: "system_prompt"
          configuration:
            enabled: true
            mode: "insert"
            system_prompt: "Prioritize concise, actionable steps with clear risk callouts."
    - name: "default-route"
      description: "Fallback route"
      priority: 100
      rules:
        operator: "AND"
        conditions: []
      modelRefs:
        - model: "qwen3-8b"
          use_reasoning: false
      algorithm:
        type: "static"

global: {}
